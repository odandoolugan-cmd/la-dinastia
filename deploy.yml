name: Deploy with Secret API Key

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - List files
        run: |
          echo "=== Archivos en el repositorio ==="
          ls -la
          echo "=== Buscando index.html ==="
          ls -la index.html || echo "index.html no encontrado"

      - name: Inject API Key into index.html
        run: |
          if [ -f "index.html" ]; then
            sed -i "s|__GROQ_API_KEY__|${{ secrets.GROQ_API_KEY }}|g" index.html
            echo "✅ API key inyectada en index.html"
          else
            echo "❌ ERROR: No se encontró index.html"
            exit 1
          fi
          
      - name: Verify injection
        run: |
          if grep -q "__GROQ_API_KEY__" index.html; then
            echo "⚠️ El marcador aún está presente"
            exit 1
          else
            echo "✅ Verificación exitosa"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
