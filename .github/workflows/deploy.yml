name: Proxy API Call

on:
  push:
    paths:
      - 'request.txt'   # Se activa cuando se crea/modifica este archivo

jobs:
  call-groq-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read user request
        id: read
        run: |
          if [ -f request.txt ]; then
            echo "prompt=$(cat request.txt)" >> $GITHUB_OUTPUT
          fi

      - name: Call Groq API
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          response=$(curl -s -X POST https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"mixtral-8x7b-32768\",
              \"messages\": [{\"role\": \"user\", \"content\": \"${{ steps.read.outputs.prompt }}\"}]
            }")
          echo "$response" > response.json

      - name: Commit response
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add response.json
          git commit -m "Actualizar respuesta de la API" || echo "No changes to commit"
          git push
